<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">ToDo一覧</h1>
            <a class="btn btn-primary" th:href="@{/todo/new}" href="/todo/new">新規登録</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show flash-alert" role="alert">
            <span th:text="${successMessage}">ToDoを削除しました</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show flash-alert" role="alert">
            <span th:text="${errorMessage}">削除に失敗しました</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0" th:if="${#lists.isEmpty(todos)}">
            <div class="card-body p-5 text-center">
                <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
                <p class="text-muted mb-4">最初のToDoを作成して、タスク管理を始めましょう。</p>
                <a class="btn btn-primary btn-lg px-4" th:href="@{/todo/new}" href="/todo/new">新規作成</a>
            </div>
        </div>

        <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" class="px-3">ID</th>
                            <th scope="col">タイトル</th>
                            <th scope="col">ステータス</th>
                            <th scope="col" class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="todo : ${todos}">
                            <td class="px-3" th:text="${todo.id}">1</td>
                            <td th:text="${todo.title}">サンプルタイトル</td>
                            <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                            <td class="text-center">
                                <a class="btn btn-outline-primary btn-sm me-1"
                                    th:href="@{/todo/{id}/edit(id=${todo.id})}" href="/todo/1/edit">編集</a>
                                <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline"
                                    onsubmit="return confirm('本当に削除しますか？');">
                                    <button type="submit" class="btn btn-danger btn-sm">削除</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        setTimeout(function () {
            document.querySelectorAll('.flash-alert').forEach(function (element) {
                bootstrap.Alert.getOrCreateInstance(element).close();
            });
        }, 3000);
    </script>
</body>
</html>
